[tox]
isolated_build = true
envlist = py38, py39, py310, py311, py312, py313, py314
min_version = 4.0
requires = tox-uv
skipsdist = true

[testenv]
uv_sync = true
deps =
    .[test,docs]
commands =
    pytest -m "not slow" {posargs}
passenv =
    CI
    GITHUB_*
    UV_*
    PYTHON*
setenv =
    PYTHONPATH = {toxinidir}/src
    PYTHONDONTWRITEBYTECODE = 1
