# ReadTheDocs 配置
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

# 构建配置
build:
  os: ubuntu-24.04
  tools:
    python: "3.8"

# Python 依赖与构建命令
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

# Sphinx 构建
sphinx:
  configuration: docs/conf.py
  builder: html
  fail_on_warning: false
