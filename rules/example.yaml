# fuscan 规则文件示例
# 规则集合：每条规则定义匹配条件、作用域与元信息
version: "1.0"

# 规则列表
rules:
  # 示例 1：检测文件名包含敏感关键字
  - name: 敏感文件名检测
    description: 检测文件名中包含 password/secret/credential 等敏感词
    severity: warning
    match:
      type: filename
      mode: contains        # contains | equals | startswith | endswith | regex
      pattern: password
      case_sensitive: false

  # 示例 2：检测文件内容包含特定字符串（启用替换）
  # replace: true 表示在详情区点击「替换内容」按钮时，将该规则命中的文本
  #         替换为 replace_with 字段定义的内容
  # replace_with: 替换为的文本（缺省时点击替换按钮会提示用户补充）
  - name: 密钥泄露检测
    description: 检测文件内容中包含 AKIA 开头的 AWS Access Key
    severity: critical
    replace: true
    replace_with: "***REDACTED***"
    match:
      type: content
      mode: regex
      pattern: 'AKIA[0-9A-Z]{16}'
      case_sensitive: true

  # 示例 3：使用 AND 逻辑组合
  - name: 配置文件敏感词
    description: .conf/.ini/.yaml 文件中同时包含 password 和 database
    severity: warning
    match:
      type: and
      children:
        - type: filename
          mode: regex
          pattern: '\.(conf|ini|ya?ml)$'
        - type: content
          mode: contains
          pattern: password
          case_sensitive: false

  # 示例 4：使用 OR 逻辑组合
  - name: 多敏感词任一命中
    description: 内容中包含 token 或 api_key
    severity: info
    match:
      type: or
      children:
        - type: content
          mode: contains
          pattern: token
          case_sensitive: false
        - type: content
          mode: contains
          pattern: api_key
          case_sensitive: false

  # 示例 5：使用 NOT 逻辑组合
  - name: 非备份目录的密码文件
    description: 文件名含 password 但不在 backup 目录中
    severity: warning
    match:
      type: and
      children:
        - type: filename
          mode: contains
          pattern: password
          case_sensitive: false
        - type: not
          child:
            type: path
            mode: contains
            pattern: backup
            case_sensitive: false

  # 示例 6：启用替换但未定义 replace_with
  # 点击「替换内容」按钮时会提示用户补充 replace_with 字段
  - name: 通用密码赋值-待补全替换
    description: 检测配置文件中的密码赋值语句，需用户补充 replace_with 后才能替换
    severity: warning
    replace: true
    # replace_with 未定义
    match:
      type: content
      mode: regex
      pattern: '(?i)(password|passwd|pwd)\s*[=:]\s*\S+'
