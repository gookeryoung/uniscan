# pyfilescan 内置通用规则
#
# 此文件随软件分发，提供通用的过滤与识别规则。
# 用户规则文件中同名规则会覆盖此处对应的规则；
# ignore_dirs / ignore_extensions / ignore_paths 取并集。
version: "1.0"

# 常见开发/构建目录，按目录名匹配（任意层级）
ignore_dirs:
  - .git
  - .svn
  - .hg
  - node_modules
  - __pycache__
  - .mypy_cache
  - .pytest_cache
  - .ruff_cache
  - .venv
  - venv
  - env
  - dist
  - build
  - target
  - out
  - .idea
  - .vscode
  - .cache
  - .gradle
  - .tox
  - .eggs
  - .sass-cache

# 常见二进制/临时文件扩展名
ignore_extensions:
  - pyc
  - pyo
  - pyd
  - so
  - dll
  - exe
  - bin
  - obj
  - o
  - a
  - lib
  - class
  - jar
  - war
  - png
  - jpg
  - jpeg
  - gif
  - bmp
  - ico
  - svg
  - mp3
  - mp4
  - avi
  - mov
  - zip
  - rar
  - 7z
  - tar
  - gz
  - bz2

# 路径级 glob 过滤（相对扫描根目录，大小写不敏感）
ignore_paths:
  - "*/vendor/*"
  - "*/.cache/*"
  - "*/third_party/*"

rules:
  # ---------- 密钥与凭证 ----------
  - name: AWS访问密钥
    description: 检测 AWS Access Key ID 格式（AKIA 开头 20 位字符）
    severity: critical
    match:
      type: content
      mode: regex
      pattern: 'AKIA[0-9A-Z]{16}'
    file_extensions:
      - txt
      - conf
      - cfg
      - ini
      - yaml
      - yml
      - json
      - env
      - properties
      - sh

  - name: 私钥文件头
    description: 检测 PEM 格式私钥文件头
    severity: critical
    match:
      type: content
      mode: regex
      pattern: '-----BEGIN\s+(RSA\s+|EC\s+|DSA\s+|OPENSSH\s+|PGP\s+)?PRIVATE\s+KEY-----'

  - name: 通用密码赋值
    description: 检测配置文件中的密码赋值语句
    severity: warning
    match:
      type: content
      mode: regex
      pattern: '(?i)(password|passwd|pwd)\s*[=:]\s*\S+'
    file_extensions:
      - conf
      - cfg
      - ini
      - env
      - properties
      - yaml
      - yml

  - name: 通用API密钥赋值
    description: 检测配置文件中的 API Key 赋值语句
    severity: warning
    match:
      type: content
      mode: regex
      pattern: '(?i)(api[_-]?key|apikey|secret[_-]?key)\s*[=:]\s*\S+'
    file_extensions:
      - conf
      - cfg
      - ini
      - env
      - properties
      - yaml
      - yml
      - json

  - name: 数据库连接串
    description: 检测包含凭证的数据库连接字符串
    severity: warning
    match:
      type: content
      mode: regex
      pattern: '(?i)(mongodb|postgres|postgresql|mysql|redis)://\S+:\S+@'

  - name: Bearer令牌
    description: 检测 HTTP Bearer 令牌
    severity: info
    match:
      type: content
      mode: regex
      pattern: '(?i)bearer\s+[A-Za-z0-9._\-]+'

  # ---------- 敏感文件名 ----------
  - name: 敏感配置文件名
    description: 检测常见敏感配置文件名
    severity: info
    match:
      type: filename
      mode: regex
      pattern: '(?i)(^\.env$|^\.env\.|^credentials|^secrets\.|\.pem$|\.key$|\.pfx$|\.keystore$)'

  - name: 备份文件
    description: 检测备份文件名
    severity: info
    match:
      type: filename
      mode: regex
      pattern: '(?i)\.(bak|backup|old|orig|swp|tmp)$'
