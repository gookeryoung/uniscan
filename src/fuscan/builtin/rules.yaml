# fuscan 内置通用规则
#
# 此文件随软件分发，提供通用的过滤与识别规则。
# 用户规则文件中同名规则会覆盖此处对应的规则；
# ignore_paths 取并集。
version: "1.0"

# 路径级 glob 过滤（相对扫描根目录，大小写不敏感）
ignore_paths:
  - "*/vendor/*"
  - "*/.cache/*"
  - "*/third_party/*"

rules:
  # ---------- 敏感个人信息(PRIVATE INFO) ----------
  - name: P0101-私钥文件头
    description: 检测 PEM 格式私钥文件头
    severity: critical
    match:
      type: content
      mode: regex
      pattern: '-----BEGIN\s+(RSA\s+|EC\s+|DSA\s+|OPENSSH\s+|PGP\s+)?PRIVATE\s+KEY-----'
  - name: P0102-通用密码赋值
    description: 检测配置文件中的密码赋值语句
    severity: warning
    match:
      type: content
      mode: regex
      pattern: '(?i)(password|passwd|pwd)\s*[=:]\s*\S+'
  - name: P0103-敏感配置文件名
    description: 检测常见敏感配置文件名
    severity: info
    match:
      type: filename
      mode: regex
      pattern: '(?i)(^\.env$|^\.env\.|^credentials|^secrets\.|\.pem$|\.key$|\.pfx$|\.keystore$)'
  - name: P0104-邮件信息包含敏感词
    description: 检测邮件信息包含敏感词
    severity: critical
    match:
      type: and
      children:
        - type: filename
          mode: regex
          pattern: '(?i)(^\.eml$)'
        - type: content
          mode: regex
          pattern: '(价格|内部|商业|薪酬)'
